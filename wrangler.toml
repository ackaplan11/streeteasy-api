name = "streeteasy-watcher"
main = "src/worker/entry.ts"
compatibility_date = "2025-01-01"

# Cron-triggered only — no HTTP endpoint needed, no workers.dev publish.
workers_dev = false

[triggers]
# All crons run in UTC.
# - Poll cron: 12-23 UTC ≈ 8am-7:50pm ET during EDT (Mar-Nov),
#   7am-6:50pm ET during EST (Nov-Mar). No overnight polling.
# - Reminder cron: 15:00 UTC (11am ET during EDT). After POLL_CUTOFF
#   passes, sends a daily email nagging you to delete the worker.
crons = ["*/10 12-23 * * *", "0 15 * * *"]

# Cloudflare KV namespace for persisted state.
[[kv_namespaces]]
binding = "WATCHER_STATE"
id = "3fbe61e5930b4809a4a5ab85a1fee263"

# Non-secret defaults. Override per-environment as needed.
[vars]
WATCHERS_JSON = """
{
  \"areas\": [\"BUSHWICK\", \"RIDGEWOOD\", \"WILLIAMSBURG\", \"EAST_WILLIAMSBURG\"],
  \"watchers\": [
    { \"label\": \"studios-1br\", \"upperPrice\": 3200, \"bedroomLower\": 0, \"bedroomUpper\": 1 },
    { \"label\": \"2br\",         \"upperPrice\": 5200, \"bedroomLower\": 2, \"bedroomUpper\": 2 }
  ]
}
"""
RESEND_FROM = "onboarding@resend.dev"
RESEND_TO = "ac.kaplan11@gmail.com"

# Hard cutoff — no polls fire on or after this instant.
# 2026-09-16T04:00:00Z = 2026-09-16 00:00 ET, i.e. runs through end of Sept 15 ET.
POLL_CUTOFF = "2026-09-16T04:00:00Z"

# Secrets (not in this file) — set with:
#   wrangler secret put RESEND_API_KEY
