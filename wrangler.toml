name = "streeteasy-watcher"
main = "src/worker/entry.ts"
compatibility_date = "2025-01-01"

# Cron-triggered only — no HTTP endpoint needed, no workers.dev publish.
workers_dev = false

[triggers]
crons = ["*/10 * * * *"]

# Cloudflare KV namespace for persisted state.
[[kv_namespaces]]
binding = "WATCHER_STATE"
id = "3fbe61e5930b4809a4a5ab85a1fee263"

# Non-secret defaults. Override per-environment as needed.
[vars]
WATCHERS_JSON = """
{
  \"areas\": [\"BUSHWICK\", \"RIDGEWOOD\", \"WILLIAMSBURG\", \"EAST_WILLIAMSBURG\"],
  \"watchers\": [
    { \"label\": \"studios-1br\", \"upperPrice\": 3200, \"bedroomLower\": 0, \"bedroomUpper\": 1 },
    { \"label\": \"2br\",         \"upperPrice\": 5200, \"bedroomLower\": 2, \"bedroomUpper\": 2 }
  ]
}
"""
RESEND_FROM = "onboarding@resend.dev"
RESEND_TO = "ac.kaplan11@gmail.com"

# Secrets (not in this file) — set with:
#   wrangler secret put RESEND_API_KEY
